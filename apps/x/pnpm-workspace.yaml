packages:
  - apps/*
  - packages/*

allowBuilds:
  core-js: true
  electron: true
  electron-winstaller: true
  esbuild: true
  fs-xattr: true
  macos-alias: true
  node-pty: true
  protobufjs: true

catalog:
  vitest: 4.1.7

onlyBuiltDependencies:
  - core-js
  - electron
  - electron-winstaller
  - esbuild
  - fs-xattr
  - macos-alias
  - protobufjs
patchedDependencies:
  '@openai/codex@0.128.0': patches/@openai__codex@0.128.0.patch
