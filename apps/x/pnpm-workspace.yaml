packages:
  - apps/*
  - packages/*

allowBuilds:
  baileys: true
  core-js: true
  electron: true
  electron-winstaller: true
  esbuild: true
  fs-xattr: true
  macos-alias: true
  node-pty: true
  protobufjs: true

blockExoticSubdeps: false

overrides:
  vscode-jsonrpc: 8.2.0

# langium imports vscode-jsonrpc/lib/common/events.js but doesn't declare the
# dependency (it only gets it transitively via vscode-languageserver), which
# breaks resolution under pnpm's strict layout. Graft it on.
packageExtensions:
  langium:
    dependencies:
      vscode-jsonrpc: '*'

catalog:
  vitest: 4.1.7

onlyBuiltDependencies:
  - baileys
  - core-js
  - electron
  - electron-winstaller
  - esbuild
  - fs-xattr
  - macos-alias
  - protobufjs

minimumReleaseAgeExclude:
  - '@expo/cli@57.0.8'
  - '@expo/config-plugins@57.0.5'
  - '@expo/config-types@57.0.2'
  - '@expo/config@57.0.5'
  - '@expo/devtools@57.0.1'
  - '@expo/dom-webview@57.0.1'
  - '@expo/env@2.4.2'
  - '@expo/fingerprint@0.20.5'
  - '@expo/image-utils@0.11.3'
  - '@expo/inline-modules@0.1.3'
  - '@expo/json-file@11.0.1'
  - '@expo/local-build-cache-provider@57.0.4'
  - '@expo/log-box@57.0.1'
  - '@expo/metro-config@57.0.5'
  - '@expo/metro-file-map@57.0.1'
  - '@expo/metro-runtime@57.0.5'
  - '@expo/osascript@2.7.1'
  - '@expo/package-manager@1.13.1'
  - '@expo/plist@0.8.1'
  - '@expo/prebuild-config@57.0.7'
  - '@expo/require-utils@57.0.3'
  - '@expo/router-server@57.0.3'
  - '@expo/schema-utils@57.0.2'
  - '@expo/ui@57.0.6'
  - babel-preset-expo@57.0.3
  - expo-asset@57.0.5
  - expo-constants@57.0.5
  - expo-device@57.0.1
  - expo-file-system@57.0.1
  - expo-font@57.0.1
  - expo-glass-effect@57.0.1
  - expo-image@57.0.1
  - expo-keep-awake@57.0.1
  - expo-linking@57.0.3
  - expo-modules-autolinking@57.0.7
  - expo-modules-core@57.0.5
  - expo-modules-jsi@57.0.3
  - expo-router@57.0.6
  - expo-server@57.0.1
  - expo-splash-screen@57.0.4
  - expo-status-bar@57.0.1
  - expo-symbols@57.0.1
  - expo-system-ui@57.0.1
  - expo-web-browser@57.0.1
  - expo@57.0.6
  - expo-camera@57.0.2
  - expo-secure-store@57.0.1
